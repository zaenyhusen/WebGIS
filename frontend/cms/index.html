<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoEngine CMS — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #131313;
      --surface: #1c1b1b;
      --surface-high: #2a2a2a;
      --border: #3b494c;
      --primary: #00E5FF;
      --text: #e5e2e1;
      --text-muted: #849396;
      --danger: #FF3B3B;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-wrap {
      width: 100%;
      max-width: 400px;
      padding: 24px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 18px;
    }
    .logo-text {
      font-size: 20px;
      font-weight: 700;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 32px;
    }
    .login-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus { border-color: var(--primary); }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.15s;
    }
    .btn-login:hover { opacity: 0.85; }
    .error-msg {
      background: rgba(255,59,59,0.1);
      border: 1px solid var(--danger);
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--danger);
      margin-bottom: 16px;
      display: none;
    }
    .coords {
      text-align: center;
      margin-top: 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="logo">
    <div class="https://i.imgur.com/Gwf1fsF.png"><i class="ti ti-hexagon"></i></div>
    <span class="logo-text">Geoacces CMS</span>
  </div>
  <div class="login-card">
    <div class="login-title">Selamat Datang</div>
    <div class="login-sub">Masuk ke panel administrasi GeoEngine</div>
    <div class="error-msg" id="error-msg">
      <i class="ti ti-alert-circle"></i> Username atau password salah
    </div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-input" type="text" id="username" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-login" onclick="doLogin()">
      <i class="ti ti-login"></i> Masuk ke CMS
    </button>
  </div>
  <div class="coords">EPSG:4326 // WGS84 // GeoEngine v1.0</div>
</div>

<script>
  const API = 'https://geoengine.vercel.app/api';

  // Cek kalau sudah login
  if (localStorage.getItem('geo_token')) {
    window.location.href = '/cms/dashboard.html';
  }

  async function doLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if (!username || !password) {
      showError('Username dan password wajib diisi');
      return;
    }

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok && data.token) {
        localStorage.setItem('geo_token', data.token);
        localStorage.setItem('geo_user', JSON.stringify(data.user));
        window.location.href = '/cms/dashboard.html';
      } else {
        showError(data.message || 'Login gagal');
      }
    } catch (err) {
      showError('Tidak dapat terhubung ke server');
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Login dengan Enter
  document.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
