<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoEngine — WebGIS</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #131313;
      --surface: #1c1b1b;
      --surface-high: #2a2a2a;
      --border: #3b494c;
      --primary: #00E5FF;
      --primary-dim: #00daf3;
      --text: #e5e2e1;
      --text-muted: #849396;
      --danger: #FF3B3B;
      --sidebar-width: 280px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 24px;
      z-index: 1000;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--primary);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      font-size: 14px;
    }

    nav {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }

    nav a {
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      transition: all 0.15s;
    }

    nav a:hover { color: var(--text); background: var(--surface-high); }
    nav a.active { color: var(--primary); border-bottom: 2px solid var(--primary); border-radius: 0; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 12px;
      width: 220px;
    }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      width: 100%;
    }

    .search-box input::placeholder { color: var(--text-muted); }
    .search-box i { color: var(--text-muted); font-size: 15px; }

    /* ── MAIN LAYOUT ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }

    .sidebar-section {
      padding: 16px 12px 8px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      font-size: 13px;
      color: var(--text-muted);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .sidebar-item:hover { background: var(--surface-high); color: var(--text); }
    .sidebar-item.active { background: rgba(0,229,255,0.1); color: var(--primary); }
    .sidebar-item i { font-size: 17px; }

    .category-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .category-count {
      margin-left: auto;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      background: var(--surface-high);
      padding: 2px 6px;
      border-radius: 99px;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-export {
      width: 100%;
      padding: 10px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-export:hover { opacity: 0.85; }

    /* ── MAP ── */
    #map {
      flex: 1;
      background: var(--bg);
    }

    /* Leaflet overrides */
    .leaflet-container { background: #0e0e0e; }
    .leaflet-control-zoom a {
      background: var(--surface) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface-high) !important; }
    .leaflet-control-attribution {
      background: rgba(19,19,19,0.8) !important;
      color: var(--text-muted) !important;
      font-size: 10px !important;
    }
    .leaflet-control-attribution a { color: var(--primary) !important; }

    /* Custom marker */
    .geo-marker {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid rgba(0,229,255,0.4);
      box-shadow: 0 0 8px rgba(0,229,255,0.6);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .geo-marker:hover { transform: scale(1.4); }

    /* Koordinat readout */
    .coords-readout {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background: rgba(19,19,19,0.85);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 5px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      z-index: 500;
      pointer-events: none;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 640px;
      max-width: 90vw;
      overflow: hidden;
      display: flex;
    }

    .modal-image {
      width: 220px;
      flex-shrink: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 40px;
    }

    .modal-body { flex: 1; padding: 20px; }

    .modal-category {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid;
      padding: 3px 8px;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 10px;
      color: var(--text);
    }

    .modal-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .modal-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
    }

    .modal-meta-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .tools-list { display: flex; gap: 6px; flex-wrap: wrap; }

    .tool-chip {
      font-size: 11px;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 3px 8px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .confidence-bar {
      height: 4px;
      background: var(--surface-high);
      border-radius: 2px;
      width: 140px;
      margin-top: 6px;
    }

    .confidence-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 2px;
      transition: width 0.4s;
    }

    .confidence-val {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      margin-top: 4px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-primary {
      flex: 1;
      padding: 10px;
      background: var(--primary);
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
    }

    .btn-icon {
      width: 38px;
      height: 38px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .btn-close {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="#">
    <img src="https://i.imgur.com/Gwf1fsF.png" 
         style="height:28px;width:28px;border-radius:6px;object-fit:cover" 
         alt="Geoaccess"/>
    Geoaccess
  </a>
</header>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div style="padding:8px 4px 12px">
        <div style="font-weight:600;font-size:14px">Portofolio Pemetaan</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">
          Dokumentasi portofolio analisis geospasial untuk mendukung 
          pengambilan keputusan berbasis data dari skala kawasan hingga nasional.
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Filter Kategori</div>
      <button class="sidebar-item active" onclick="filterByCategory(null, this)">
        <i class="ti ti-world"></i> Semua Kategori
        <span class="category-count" id="count-all">0</span>
      </button>
      <div id="category-list"></div>
    </div>

  </aside>

  <!-- MAP -->
  <div style="position:relative;flex:1;height:100%;display:flex;flex-direction:column;">
    <div id="map" style="flex:1;height:100%;"></div>
    <div class="coords-readout" id="coords">
      <span id="lat-lng">-6.2088° S, 106.8456° E</span>
    </div>
  </div>

</div>

<!-- MODAL DETAIL -->
<div class="modal-overlay" id="modal">
  <div class="modal" style="position:relative">
    <button class="btn-close" onclick="closeModal()">
      <i class="ti ti-x"></i>
    </button>
    <div class="modal-image" id="modal-image">
      <i class="ti ti-map-2"></i>
    </div>
    <div class="modal-body">
      <div class="modal-category" id="modal-category"></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-meta">
        <div>
          <div class="modal-meta-label">Tools Utilized</div>
          <div class="tools-list" id="modal-tools"></div>
        </div>
        <div>
          <div class="modal-meta-label">Confidence</div>
          <div class="confidence-bar">
            <div class="confidence-fill" id="modal-confidence-bar"></div>
          </div>
          <div class="confidence-val" id="modal-confidence-val"></div>
        </div>
      </div>
      <div class="modal-actions">
        <a class="btn-primary" id="modal-link" href="#" target="_blank">
          <i class="ti ti-external-link"></i> View Full Report
        </a>
        <button class="btn-icon"><i class="ti ti-bookmark"></i></button>
      </div>
    </div>
  </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const API = 'https://geoengine.vercel.app/api';
  let allFeatures = [];
  let markers = [];

  // Init peta
  const map = L.map('map', {
    center: [-2.5, 118],
    zoom: 5,
    zoomControl: true
  });

  // Tile dark mode
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Dark_Gray_Base/MapServer/tile/{z}/{y}/{x}', {
  attribution: '&copy; Esri &copy; HERE &copy; OpenStreetMap',
  maxZoom: 16
}).addTo(map);

  // Update koordinat saat mouse bergerak
  map.on('mousemove', (e) => {
    const lat = e.latlng.lat.toFixed(4);
    const lng = e.latlng.lng.toFixed(4);
    const latDir = lat >= 0 ? 'N' : 'S';
    const lngDir = lng >= 0 ? 'E' : 'W';
    document.getElementById('lat-lng').textContent =
      `${Math.abs(lat)}° ${latDir}, ${Math.abs(lng)}° ${lngDir}`;
  });

  // Load kategori ke sidebar
  async function loadCategories() {
    const res = await fetch(`${API}/categories`);
    const data = await res.json();
    const list = document.getElementById('category-list');
    data.data.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'sidebar-item';
      btn.innerHTML = `
        <span class="category-dot" style="background:${cat.color}"></span>
        ${cat.name}
        <span class="category-count" id="count-${cat.slug}">0</span>
      `;
      btn.onclick = () => filterByCategory(cat.slug, btn);
      list.appendChild(btn);
    });
  }

  // Load titik analisis ke peta
  async function loadPoints(categorySlug = null) {
    let url = `${API}/analysis-points`;
    if (categorySlug) url += `?category=${categorySlug}`;

    const res = await fetch(url);
    const geojson = await res.json();
    allFeatures = geojson.features;

    // Hapus marker lama
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    // Update count
    document.getElementById('count-all').textContent = allFeatures.length;

    // Tambah marker baru
    allFeatures.forEach(feature => {
      const [lng, lat] = feature.geometry.coordinates;
      const props = feature.properties;

      const icon = L.divIcon({
        className: '',
        html: `<div class="geo-marker" style="background:${props.category_color};box-shadow:0 0 8px ${props.category_color}80"></div>`,
        iconSize: [12, 12],
        iconAnchor: [6, 6]
      });

      const marker = L.marker([lat, lng], { icon })
        .addTo(map)
        .on('click', () => openModal(props));

      markers.push(marker);
    });
  }

  // Filter kategori
  function filterByCategory(slug, btn) {
    document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadPoints(slug);
  }

  // Buka modal
  function openModal(props) {
    document.getElementById('modal-category').textContent = props.category_name;
    document.getElementById('modal-category').style.color = props.category_color;
    document.getElementById('modal-category').style.borderColor = props.category_color;
    document.getElementById('modal-title').textContent = props.title;
    document.getElementById('modal-desc').textContent = props.description;
    document.getElementById('modal-confidence-bar').style.width = props.confidence_score + '%';
    document.getElementById('modal-confidence-val').textContent = props.confidence_score + '%';
    document.getElementById('modal-link').href = props.external_link || '#';

    const toolsEl = document.getElementById('modal-tools');
    toolsEl.innerHTML = '';
    (props.tools || []).forEach(tool => {
      toolsEl.innerHTML += `<span class="tool-chip">${tool}</span>`;
    });

    document.getElementById('modal').classList.add('open');
  }

  // Tutup modal
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  // Tutup modal klik luar
  document.getElementById('modal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // Export GeoJSON
  function exportGeoJSON() {
    const data = JSON.stringify({ type: 'FeatureCollection', features: allFeatures }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'geoengine-export.geojson';
    a.click();
  }

  // Init
  loadCategories();
  loadPoints();
</script>
</body>
</html>
